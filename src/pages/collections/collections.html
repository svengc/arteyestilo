<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colecciones</title>
</head>

<body class="overflow-x-hidden">
    <header class="navbar"></header>
    <main>
        <section class="container mx-auto px-4 py-3 text-center">
            <h1 class="text-title md:mt-4 text-2xl md:text-4xl font-cormorant tracking-tight">
                Nuestras Colecciones
            </h1>
            <p class="font-montserrat text-sm md:text-lg mt-2 text-title-alt tracking-normal">
                Piezas pensadas para quienes eligen vivir con intención.
            </p>
            <hr class=" w-32 mx-auto my-2 border-subrayado">
            <p class="font-montserrat text-sm md:text-base mt-4 text-paragraph tracking-wide max-w-6xl mx-auto">
                Explorá un catálogo curado donde el diseño y la calidad se encuentran en cada detalle. Cada pieza fue
                seleccionada para transformar tu hogar en un espacio que se siente, se recuerda y se atesora.
            </p>
        </section>
        <section class="flex items-center justify-center my-3 px-4">
            <h2 class="sr-only">Colección de productos</h2>
            <div></div>
            <div
                class="productsCollections grid grid-cols-1 grid-cols-2 lg:grid-cols-4 gap-2 md:gap-8 w-full max-w-7xl mx-auto">
            </div>
        </section>
    </main>

    <script type="module" src="./collections.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</body>

</html>
